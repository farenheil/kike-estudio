name: Notify PM via Telegram
on:
  push:
    paths:
      - 'projects.json'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, os
          with open('projects.json') as f:
              d = json.load(f)
          r = d.get('resumen', {})
          activos = r.get('activos', 0)
          por_cobrar = r.get('por_cobrar', 0)
          proyectos = d.get('proyectos', [])
          lines = ["PM Estudio"]
          lines.append(f"Activos: {activos}  Por cobrar: {por_cobrar}")
          act = [p for p in proyectos if p.get('categoria') == 'activo']
          if act:
              lines.append("")
              lines.append("EN PROGRESO:")
              for p in act:
                  nombre = p.get('cliente', '?')
                  if p.get('proyecto') and p.get('proyecto') != nombre:
                      nombre = nombre + " - " + p['proyecto']
                  estado = p.get('estado', '')
                  srv = p.get('servicio', '')
                  deadline = p.get('deadline', '')
                  info = srv
                  if deadline: info += " | " + deadline
                  lines.append(f"  {nombre} | {estado}")
                  if info: lines.append(f"    {info}")
          cob = [p for p in proyectos if p.get('categoria') == 'por_cobrar']
          if cob:
              lines.append("")
              lines.append("POR COBRAR:")
              for p in cob:
                  nombre = p.get('cliente', '?')
                  if p.get('proyecto') and p.get('proyecto') != nombre:
                      nombre = nombre + " - " + p['proyecto']
                  imp = p.get('euros_faltante', 0)
                  txt = f"  {nombre}"
                  if imp: txt += f" | {imp}EUR"
                  lines.append(txt)
          lines.append("")
          lines.append("farenheil.github.io/kike-estudio")
          msg = "\n".join(lines)
          tok = os.environ['TELEGRAM_BOT_TOKEN']
          cid = os.environ['TELEGRAM_CHAT_ID']
          data = json.dumps({"chat_id": cid, "text": msg}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{tok}/sendMessage",
              data=data, headers={"Content-Type": "application/json"})
          resp = urllib.request.urlopen(req, timeout=15)
          print("Telegram OK:", resp.status)
          PYEOF