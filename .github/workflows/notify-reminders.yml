name: Notify Recordatorio 24h via Telegram
on:
  push:
    paths:
      - 'reminders.json'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Telegram reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, os
          with open('reminders.json') as f:
              d = json.load(f)
          sesiones = d.get('sesiones', [])
          fecha = d.get('fecha_display', '?')
          tok = os.environ['TELEGRAM_BOT_TOKEN']
          cid = os.environ['TELEGRAM_CHAT_ID']
          if not sesiones:
              msg = f"Manana ({fecha}) sin sesiones. Dia libre."
              data = json.dumps({"chat_id": cid, "text": msg}).encode()
              req = urllib.request.Request(f"https://api.telegram.org/bot{tok}/sendMessage",
                  data=data, headers={"Content-Type": "application/json"})
              urllib.request.urlopen(req, timeout=15)
              print("Telegram OK: sin sesiones")
              exit(0)
          lines = [f"Sesiones manana {fecha}:"]
          for s in sesiones:
              nombre = s.get('nombre', '?')
              hora = s.get('hora', '?')
              servicio = s.get('servicio', 'Sesion')
              tel = s.get('telefono', '-')
              lines.append(f"  {nombre} a las {hora} | {servicio} | Tel: {tel}")
          msg = "\n".join(lines)
          data = json.dumps({"chat_id": cid, "text": msg}).encode()
          req = urllib.request.Request(f"https://api.telegram.org/bot{tok}/sendMessage",
              data=data, headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req, timeout=15)
          print(f"Telegram OK: {len(sesiones)} sesiones")
          PYEOF